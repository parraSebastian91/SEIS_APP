version: '3.8'

# =============================================================================
# ERP CORE - Docker Compose Principal
# =============================================================================

services:

  auth-service:
    build:
      context: ./BFF+AUTH/ms-auth
      dockerfile: Dockerfile
      target: development
    container_name: ms_auth_app
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-3000}:3000"
    env_file:
      - ./BFF+AUTH/ms-auth/.env.container
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - erp_network
    volumes:
      - ./BFF+AUTH/ms-auth:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  ms_core:
    build:
      context: ./BUSSINES/ms-core
      dockerfile: Dockerfile
      target: development
    container_name: ms_core
    restart: unless-stopped
    env_file:
      - ./BUSSINES/ms-core/.env.dev
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
    ports:
      - "${CORE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - erp_network
    volumes:
      - ./BUSSINES/ms-core:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3001"
      - "prometheus. path=/metrics"

  app-login:
    build:
      context: ./FRONTEND/app-login-erp-seis
      dockerfile: Dockerfile
    container_name: app_login
    restart: unless-stopped
    networks:
      - erp_network
    ports:
      - "0.0.0.0:8082:80"
    environment:
      - API_AUTH_URL=${APP_LOGIN_API_AUTH_URL:-/api/auth}
      - API_CORE_URL=${APP_LOGIN_API_CORE_URL:-/api/core}
      - API_BASE_URL=${APP_LOGIN_API_BASE_URL:-http://localhost:8000}
      - ENVIRONMENT=${APP_LOGIN_ENVIRONMENT:-production}
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      kong:
        condition: service_healthy
    labels:
      - "prometheus.scrape=true"

  app-portal:
    build:
      context: ./FRONTEND/seis-app-frontend
      dockerfile: dockerfile.portal
    container_name: app_portal
    restart: unless-stopped
    networks:
      - erp_network
    ports:
      - "0.0.0.0:8083:80"
    environment:
      - API_AUTH_URL=${APP_PORTAL_API_AUTH_URL:-/api/auth}
      - API_CORE_URL=${APP_PORTAL_API_CORE_URL:-/api/core}
      - API_BASE_URL=${APP_PORTAL_API_BASE_URL:-http://localhost:8000}
      - ENVIRONMENT=${APP_PORTAL_ENVIRONMENT:-production}
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      kong:
        condition: service_healthy
      app-mfe-gestion-usuario:
        condition: service_started
    labels:
      - "prometheus.scrape=true"

  app-mfe-gestion-usuario:
    build:
      context: ./FRONTEND/seis-app-frontend
      dockerfile: dockerfile.mfe-gestion-usuario
    container_name: app_mfe_gestion_usuario
    restart: unless-stopped
    networks:
      - erp_network
    ports:
      - "0.0.0.0:8084:80"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    labels:
      - "prometheus.scrape=true"

# =============================================================================
# NETWORKS
# =============================================================================
networks:  
  erp_network:  
    driver: bridge
    name:  erp_network
    external: true

