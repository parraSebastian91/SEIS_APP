version: '3.8'
name: seis-services
services:

  auth-service:
    build:
      context: ./BACKEND/ms-auth
      dockerfile: Dockerfile
      target: development
    container_name: ms_auth_app
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-3000}:3000"
    env_file:
      - ./BACKEND/ms-auth/.env.container
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
    networks:
      - erp_network
    volumes:
      - ./BACKEND/ms-auth:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  bff-seis-app:
    build:
      context: ./BACKEND/bff_seis_app
      dockerfile: Dockerfile
      target: development
    container_name: bff_seis_app
    restart: unless-stopped
    env_file:
      - ./BACKEND/bff_seis_app/.env.container
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
      AUTH_SERVICE_URL: http://ms_auth_app:3000
      CORE_SERVICE_URL: http://ms_core:3001
    ports:
      - "${PORT:-3002}:3002"
      # depends_on:
      #   auth-service:
      #     condition: service_healthy
      # ms_core:
      #   condition: service_healthy
    networks:
      - erp_network
    volumes:
      - ./BACKEND/bff_seis_app:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3002"
      - "prometheus.path=/metrics"

  ms_core:
    build:
      context: ./BACKEND/ms-core
      dockerfile: Dockerfile
      target: development
    container_name: ms_core
    restart: unless-stopped
    env_file:
      - ./BACKEND/ms-core/.env.container
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-myroot}
    ports:
      - "${CORE_PORT:-3001}:3001"
    networks:
      - erp_network
    volumes:
      - ./BACKEND/ms-core:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3001"
      - "prometheus.path=/metrics"

  ms-storage-service:
    build:
      context: ./BACKEND/storage/ms-storage-orchestrator
      dockerfile: Dockerfile
      target: development
    container_name: ms_storage_service
    restart: unless-stopped
    env_file:
      - ./BACKEND/storage/ms-storage-orchestrator/.env.dev
    ports:
      - "${STORAGE_SERVICE_PORT:-3100}:3100"
    networks:
      - erp_network
    volumes:
      - ./BACKEND/storage/ms-storage-orchestrator:/app
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3100"
      - "prometheus.path=/metrics"

  worker-storage-processor:
    build:
      context: ./BACKEND/storage/worker-storage-processor
      dockerfile: Dockerfile
      target: runtime
      args:
        ENABLE_OCR: "true"
        CARGO_FEATURES: "--features ocr"
        BUILD_PROFILE: "dev-fast"
    container_name: worker_storage_processor
    restart: unless-stopped
    ports:
      - "${STORAGE_WORKER_PORT:-3101}:3101"
    env_file:
      - ./BACKEND/storage/worker-storage-processor/.env
    networks:
      - erp_network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3101/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3101"
      - "prometheus.path=/metrics"
# =============================================================================
# NETWORKS
# =============================================================================
networks:
  erp_network:
    driver: bridge
    name: erp_network
    external: true
